name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: CI - Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # Test Server Backend
      - name: Install server dependencies
        run: npm ci
        working-directory: ./server

      - name: Run server lint
        run: npm run lint || echo "Linting skipped or not configured"
        working-directory: ./server

      - name: Run server tests
        run: npm test || echo "Tests skipped or not configured"
        working-directory: ./server

      # Test Client Frontend
      - name: Install client dependencies
        run: npm ci
        working-directory: ./client

      - name: Run client lint
        run: npm run lint || echo "Linting skipped or not configured"
        working-directory: ./client

      - name: Run client tests
        run: npm test || echo "Tests skipped or not configured"
        working-directory: ./client

      # Codecov upload
      - name: Upload Server coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload Client coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build-and-push:
    name: Build & Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & Push Backend Server Image
      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/chat-backend:latest
            ghcr.io/${{ github.repository }}/chat-backend:${{ github.sha }}

      # Build & Push Frontend Client Image
      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/chat-frontend:latest
            ghcr.io/${{ github.repository }}/chat-frontend:${{ github.sha }}

      # Build & Push Nginx Proxy Image
      - name: Build and push proxy image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/chat-proxy:latest
            ghcr.io/${{ github.repository }}/chat-proxy:${{ github.sha }}

  deploy:
    name: CD - Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH and deploy to production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/chat-app
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Wait for health check
            echo "Waiting for health check..."
            sleep 10
            curl -f http://localhost/api/status || exit 1
            echo "Health check passed!"
            
            echo "Deployment completed successfully!"

      - name: Notify Slack on success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: 'good'
          SLACK_MESSAGE: 'Deployment Succeeded! :rocket:'

      - name: Notify Slack on failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: 'danger'
          SLACK_MESSAGE: 'Deployment Failed! :x:'
